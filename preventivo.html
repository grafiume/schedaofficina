<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Preventivo ELIP</title>

<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
.header { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #000; padding-bottom:10px; }
.logo { font-size:22px; font-weight:bold; }
.section { margin-top:20px; }
.title { font-weight:bold; margin-bottom:8px; }
.box { border:1px solid #ccc; padding:10px; border-radius:8px; }
.footer { margin-top:30px; font-size:12px; border-top:1px solid #ccc; padding-top:10px; }
button { margin-top:20px; padding:10px 15px; border-radius:8px; border:0; background:#000; color:#fff; cursor:pointer;}
</style>

</head>
<body>

<div class="header">
  <div class="logo">ELIP TAGLIENTE SRL</div>
  <div>PREVENTIVO</div>
</div>

<div class="section box">
  <div><b>Cliente:</b> <span id="cliente"></span></div>
  <div><b>Data arrivo:</b> <span id="dataArrivo"></span></div>
  <div><b>Data preventivo:</b> <span id="dataPreventivo"></span></div>
  <div><b>DDT:</b> <span id="ddt"></span></div>
</div>

<div class="section box">
  <div class="title">Lavorazioni previste</div>
  <div id="ripList"></div>
</div>

<div class="section box">
  <div><b>Imponibile:</b> <span id="imponibile"></span></div>
  <div><b>IVA:</b> <span id="iva"></span></div>
  <div><b>TOTALE:</b> <span id="totale"></span></div>
</div>

<div class="section box">
  <div><b>Tempo di consegna stimato:</b> <span id="consegna"></span></div>
</div>

<div class="footer">
ELIP TAGLIENTE SRL – Officina elettromeccanica<br>
Contatti: info@elip.it – Tel: XXX
</div>

<button onclick="generaPDF()">Genera PDF</button>

<script src="preventivo.js"></script>
</body>
</html>
