<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cassetti Officina</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Gestione Cassetti</h2>

<input id="cassettoInput" placeholder="A1">

<button onclick="assegna()">Assegna automatico</button>
<button onclick="salva()">Salva manuale</button>
<button onclick="libera()">Libera</button>

<script src="cassetti-officina.js"></script>
<script>
const recordId = 1;

async function assegna(){
  const res = await CassettiOfficina.assegnaPrimoLibero(recordId);
  alert("Assegnato "+res.cassetto);
}

async function salva(){
  const val=document.getElementById('cassettoInput').value;
  const res = await CassettiOfficina.assegnaManuale(recordId,val);
  alert("Salvato "+res.cassetto);
}

async function libera(){
  await CassettiOfficina.libera(recordId);
  alert("Liberato");
}
</script>

</body>
</html>
