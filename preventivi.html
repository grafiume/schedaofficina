<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ELIP TAGLIENTE • Preventivi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="styles.css">
    <style>
      .chip{ display:inline-flex; align-items:center; gap:.4rem; padding:.25rem .55rem; border-radius:999px; font-size:.85rem; border:1px solid rgba(0,0,0,.1); background:#fff; }
      .chip strong{ font-weight:700; }
      .muted{ color:#6c757d; }
      .kpi-mini{ font-size:.9rem; }
      .table-app td{ vertical-align:middle; }
      .nowrap{ white-space:nowrap; }
      .progbar{ height:8px; border-radius:999px; background:rgba(0,0,0,.08); overflow:hidden; }
      .progbar > div{ height:100%; background:#ff7a00; width:0%; }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-light bg-light border-bottom sticky-top">
      <div class="container-fluid">
        <div class="d-flex align-items-center gap-2">
          <img src="logo-elip.jpg" class="brand-logo" alt="ELIP">
          <span class="navbar-brand mb-0 h1">PREVENTIVI</span>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-secondary" id="btnHome">Home</button>
          <button class="btn btn-orange" id="btnRefresh">Aggiorna</button>
        </div>
      </div>
    </nav>

    <div class="container my-3">
      <div id="errBanner" class="alert alert-warning d-none my-2"></div>

      <div class="row g-2 align-items-end">
        <div class="col-md-5">
          <label class="form-label">Cerca</label>
          <input id="q" class="form-control" placeholder="Cliente, descrizione, modello…">
        </div>
        <div class="col-md-3">
          <label class="form-label">Stato</label>
          <select id="status" class="form-select">
            <option value="">Inviati + Accettati</option>
            <option value="INVIATO">Solo Inviati</option>
            <option value="ACCETTATO">Solo Accettati</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Ordine</label>
          <select id="order" class="form-select">
            <option value="accepted_desc">Accettazione ↓</option>
            <option value="accepted_asc">Accettazione ↑</option>
            <option value="sent_desc">Invio ↓</option>
            <option value="sent_asc">Invio ↑</option>
          </select>
        </div>
        <div class="col-md-2 d-grid">
          <button class="btn btn-primary" id="btnApply">Applica</button>
        </div>
      </div>

      <div class="table-responsive mt-3">
        <table class="table table-app align-middle">
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Descrizione</th>
              <th class="nowrap">Stato</th>
              <th class="nowrap">Accettazione</th>
              <th class="nowrap">Consegna</th>
              <th class="nowrap">Avanz.</th>
              <th class="text-end nowrap">Totale (IVA escl.)</th>
              <th class="text-end nowrap">Azioni</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="8" class="text-center py-4 text-muted">Caricamento…</td></tr>
          </tbody>
        </table>
      </div>

      <div class="small text-muted mt-2">
        IVA fissa: <strong>22%</strong>.
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="preventivi.js?v=26"></script>
  </body>
</html>
