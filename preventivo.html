<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ELIP TAGLIENTE • Preventivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="styles.css">
    <style>
      body{ background:#f7f7f7; }
      .container-narrow{ max-width:1200px; }
      .smallmono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .progbar,.linebar{ height:8px; border-radius:999px; background:rgba(0,0,0,.08); overflow:hidden; }
      .progbar>div,.linebar>div{ height:100%; width:0%; }
      .st-DA_FARE{ background:#dc3545; }
      .st-IN_LAVORAZIONE{ background:#ffc107; }
      .st-COMPLETATA{ background:#198754; }
      .top-grid{ display:grid; grid-template-columns: repeat(6, minmax(120px,1fr)); gap:.65rem; }
      .mini-field label{ display:block; font-size:.78rem; color:#6c757d; margin-bottom:.2rem; }
      .mini-field input,.mini-field select{ height:38px; }
      .mini-note input{ height:38px; }
      .badge-urgent{ background:#dc3545; color:#fff; }
      .table-compact thead th{ font-size:.82rem; white-space:nowrap; background:#fff; position:sticky; top:0; z-index:1; }
      .table-compact td{ vertical-align:top; padding:.45rem .5rem; }
      .rip-main{ min-width:360px; }
      .rip-title{ font-size:.92rem; font-weight:700; line-height:1.15; }
      .rip-code{ display:inline-block; min-width:68px; padding:.1rem .38rem; border-radius:999px; background:#f1f3f5; color:#495057; font-size:.74rem; font-weight:700; margin-right:.4rem; }
      .rip-meta{ display:grid; grid-template-columns: 1.2fr .9fr .9fr; gap:.35rem .5rem; margin-top:.35rem; }
      .rip-meta .meta-box{ background:#fafafa; border:1px solid rgba(0,0,0,.08); border-radius:.55rem; padding:.3rem .42rem; }
      .rip-meta .meta-box label{ display:block; font-size:.7rem; color:#6c757d; margin-bottom:.15rem; }
      .rip-meta .meta-box input{ height:30px; font-size:.82rem; padding:.2rem .4rem; }
      .row-status-pill{ font-size:.73rem; font-weight:700; border-radius:999px; padding:.18rem .5rem; display:inline-block; }
      .row-status-DA_FARE{ background:#f8d7da; color:#842029; }
      .row-status-IN_LAVORAZIONE{ background:#fff3cd; color:#664d03; }
      .row-status-COMPLETATA{ background:#d1e7dd; color:#0f5132; }
      .table-compact tr.row-urgent{ box-shadow: inset 4px 0 0 #dc3545; }
      .table-compact tr.row-complete{ background:#fbfffc; }
      .table-compact tr.row-working{ background:#fffdf7; }
      .table-compact tr.row-todo{ background:#fffafb; }
      .table-compact tr.row-off td{ opacity:.72; }
      .price-input{ width:120px; min-width:120px; }
      .status-select{ min-width:165px; }
      .line-progress-wrap{ min-width:120px; }
      .toolbar-badges{ display:flex; flex-wrap:wrap; justify-content:flex-end; gap:.35rem; }
      body:not(.edit-unlocked) [data-editable="1"]{ cursor:not-allowed; }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-light bg-light border-bottom sticky-top">
      <div class="container-fluid">
        <div class="d-flex align-items-center gap-2">
          <img src="logo-elip.jpg" class="brand-logo" alt="ELIP">
          <span class="navbar-brand mb-0 h1">PREVENTIVO</span>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-secondary" id="btnBack">Indietro</button>
          <button class="btn btn-outline-secondary" id="btnOpenRecord">Scheda</button>
          <button class="btn btn-outline-secondary" id="btnUnlock">🔒 Sblocca modifiche</button>
          <button class="btn btn-orange" id="btnSave">Salva</button>
        </div>
      </div>
    </nav>

    <div class="container container-narrow py-3">
      <div id="errBanner" class="alert alert-warning d-none"></div>
      <div id="okBanner" class="alert alert-success d-none"></div>

      <div class="card shadow-sm mb-3">
        <div class="card-body">
          <div class="d-flex flex-wrap justify-content-between align-items-start gap-2 mb-2">
            <div>
              <div class="small text-muted">Cliente</div>
              <div class="h5 mb-0" id="recCliente">—</div>
              <div class="text-muted" id="recDesc">—</div>
              <div class="small text-muted" id="recModel"></div>
            </div>
            <div class="text-end">
              <div class="toolbar-badges mb-2">
                <span id="quoteStatusBadge" class="badge bg-secondary">BOZZA</span>
                <span id="urgentBadge" class="badge d-none badge-urgent">URGENTE</span>
                <span id="lockState" class="badge bg-secondary">SOLO LETTURA</span>
              </div>
              <div id="dirtyState" class="small text-muted mb-1">Salvato</div>
              <div class="small text-muted">ID Preventivo</div>
              <div class="smallmono" id="quoteId">—</div>
            </div>
          </div>

          <div class="top-grid">
            <div class="mini-field">
              <label>Stato</label>
              <select id="status" class="form-select">
                <option value="BOZZA">BOZZA</option>
                <option value="INVIATO">INVIATO</option>
                <option value="ACCETTATO">ACCETTATO</option>
                <option value="ANNULLATO">ANNULLATO</option>
              </select>
            </div>
            <div class="mini-field">
              <label>Data invio</label>
              <input id="sent_at" type="date" class="form-control">
            </div>
            <div class="mini-field">
              <label>Accettazione</label>
              <input id="accepted_at" type="date" class="form-control">
            </div>
            <div class="mini-field">
              <label>Consegna gg</label>
              <input id="delivery_days" type="number" min="0" step="1" class="form-control" placeholder="es. 10">
            </div>
            <div class="mini-field">
              <label>Data scadenza</label>
              <input id="delivery_date" type="date" class="form-control">
            </div>
            <div class="mini-field d-flex align-items-end">
              <div class="form-check border rounded px-3 py-2 w-100 bg-light">
                <input class="form-check-input" type="checkbox" id="is_urgent">
                <label class="form-check-label fw-bold text-danger" for="is_urgent">URGENTE</label>
              </div>
            </div>
          </div>

          <div class="mini-note mt-2">
            <label class="form-label mb-1">Note</label>
            <input id="notes" class="form-control" placeholder="Note interne / note al cliente…">
          </div>

          <div class="mt-3">
            <div class="d-flex justify-content-between small"><span>Avanzamento preventivo</span><span id="quoteProgressTxt">0%</span></div>
            <div class="progbar"><div id="quoteProgBar"></div></div>
            <div class="small mt-1" id="dueLabel">—</div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
          <strong>Voci RIP</strong>
          <div class="small text-muted">Tabella compatta: sotto ogni voce trovi operatore, data inizio e data fine.</div>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-app table-compact align-middle">
              <thead>
                <tr>
                  <th style="width:40px;"></th>
                  <th>Voce RIP</th>
                  <th style="width:180px;">Stato</th>
                  <th style="width:140px;">Prezzo</th>
                  <th style="width:150px;">Avanz.</th>
                </tr>
              </thead>
              <tbody id="taskRows">
                <tr><td colspan="5" class="text-center py-4 text-muted">Caricamento…</td></tr>
              </tbody>
            </table>
          </div>

          <div class="d-flex justify-content-end mt-3">
            <div style="min-width:320px;" class="text-end">
              <div class="d-flex justify-content-between"><span class="text-muted">Totale IVA esclusa</span><span class="fw-semibold" id="subtotal">€ 0,00</span></div>
              <div class="d-flex justify-content-between"><span class="text-muted">IVA 22%</span><span class="fw-semibold" id="vat">€ 0,00</span></div>
              <div class="d-flex justify-content-between fs-5"><span class="fw-semibold">Totale</span><span class="fw-bold" id="grand">€ 0,00</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="preventivo.js"></script>
  </body>
</html>
