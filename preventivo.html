<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preventivo ELIP</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  padding:10px;
  background:#f5f5f5;
}

.container {
  max-width:1200px;
  margin:auto;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

.grid {
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

@media(min-width:768px){
  .grid{
    grid-template-columns:repeat(3,1fr);
  }
}

input,select{
  width:100%;
  padding:8px;
  font-size:16px;
}

button{
  width:100%;
  padding:10px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#ff6600;
  color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Cliente: ISIDORI</h2>
<p>Motore Bosch GBH5 DCE</p>
</div>

<div class="card grid">
<div><label>Data Invio</label><input></div>
<div><label>Accettazione</label><input></div>
<div><label>Consegna</label><input></div>
</div>

<div class="card">
<h3>Voci lavorazione</h3>
<p>Layout ottimizzato mobile</p>
</div>

<button>Salva</button>

</div>

</body>
</html>
